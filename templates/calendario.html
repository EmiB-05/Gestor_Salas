{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="mb-0">Horario Semanal de Salas</h2>
        <small class="text-muted">
            Gestiona las reservas y disponibilidad de salas
        </small>
    </div>

    <a href="/registrar" class="btn btn-primary">
        + Nuevo Evento
    </a>
</div>

<div class="row">

    <!-- Calendario -->
    <div class="col-lg-8">

        <div class="card shadow-sm">
            <div class="card-body">
                <div id="calendar"></div>
            </div>
        </div>

    </div>

    <!-- Panel lateral -->
    <div class="col-lg-4">

        <div class="card shadow-sm">

            <div class="card-header bg-primary text-white">
                Detalles de Reserva
            </div>

            <div class="card-body" id="detalle-reserva">

                <div class="text-center text-muted">

                    <h5>Sin selección</h5>

                    <p>
                        Selecciona una reserva o un horario libre para ver detalles.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FullCalendar CSS -->
<link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.css"
    rel="stylesheet">

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>

<script>

// Datos enviados desde Flask
const eventosDB = {{ eventos|tojson }};

document.addEventListener('DOMContentLoaded', function() {

    const calendarEl = document.getElementById('calendar');

    // Convertir eventos para FullCalendar
    const eventos = eventosDB.map(evento => ({

        id: evento.id,

        title: evento.title,

        start: evento.start,

        end: evento.end,

        color:
            evento.estado === "Activo"
                ? "#198754"
                : evento.estado === "Modificado"
                    ? "#ffc107"
                    : "#dc3545",

        extendedProps: {

            responsable: evento.responsable,

            asistentes: evento.asistentes,

            estado: evento.estado,

            sala: evento.sala || "Sin asignar"

        }

    }));

    const calendar = new FullCalendar.Calendar(calendarEl, {

        locale: 'es',

        initialView: 'timeGridWeek',

        allDaySlot: false,

        selectable: true,

        slotMinTime: '07:00:00',

        slotMaxTime: '21:00:00',

        height: 'auto',

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'timeGridWeek,timeGridDay'
        },

        events: eventos,

        // Mostrar asistentes y sala dentro del evento

        eventContent: function(arg) {

            return {

                html: `
                    <div>

                        <div style="font-weight:bold;">
                            ${arg.event.title}
                        </div>

                        <div style="font-size:11px;">
                            📍 ${arg.event.extendedProps.sala}
                        </div>

                        <div style="font-size:10px;">
                            👥 ${arg.event.extendedProps.asistentes}
                        </div>

                    </div>
                `
            };
        },

        // Selección de horario libre

        select: function(info) {

            document.getElementById('detalle-reserva').innerHTML = `

                <h5 class="mb-3">Nueva Reserva</h5>

                <p>
                    <strong>Inicio:</strong><br>
                    ${new Date(info.start).toLocaleString()}
                </p>

                <p>
                    <strong>Fin:</strong><br>
                    ${new Date(info.end).toLocaleString()}
                </p>

                <a
                    href="/registrar?inicio=${info.startStr}&fin=${info.endStr}"
                    class="btn btn-primary w-100">

                    Reservar Sala

                </a>

            `;
        },

        // Click en evento

        eventClick: function(info) {

            const e = info.event;

            document.getElementById('detalle-reserva').innerHTML = `

                <h5 class="mb-3">
                    ${e.title}
                </h5>

                <div class="mb-2">

                    <span class="badge bg-success">
                        ${e.extendedProps.estado}
                    </span>

                </div>

                <p>
                    <strong>Responsable:</strong><br>
                    ${e.extendedProps.responsable}
                </p>

                <p>
                    <strong>Sala:</strong><br>
                    ${e.extendedProps.sala}
                </p>

                <p>
                    <strong>Asistentes:</strong><br>
                    ${e.extendedProps.asistentes}
                </p>

                <p>
                    <strong>Inicio:</strong><br>
                    ${e.start.toLocaleString()}
                </p>

                <p>
                    <strong>Fin:</strong><br>
                    ${e.end.toLocaleString()}
                </p>

                <div class="d-grid gap-2">

                    <button class="btn btn-outline-primary">
                        Editar
                    </button>

                    <button class="btn btn-outline-danger">
                        Cancelar
                    </button>

                </div>

            `;
        }

    });

    calendar.render();

});
</script>

{% endblock %}
