{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <h2 class="mb-0">Horario Semanal de Salas</h2>
        <small class="text-muted">
            Gestiona las reservas y disponibilidad de salas
        </small>
    </div>

    <div class="d-flex gap-2">

        <button
            class="btn btn-outline-secondary"
            data-bs-toggle="modal"
            data-bs-target="#modalReporte">
            📄 Reporte PDF
        </button>

        <a href="/registrar" class="btn btn-primary">
            + Nuevo Evento
        </a>

    </div>
</div>

<!--Reporte PDF -->
<div class="modal fade" id="modalReporte" tabindex="-1" aria-labelledby="modalReporteLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalReporteLabel">Reporte Semanal PDF</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label class="form-label text-muted small mb-1">
                    Selecciona la semana a exportar:
                </label>
                <input
                    type="week"
                    id="fechaReporte"
                    class="form-control">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <a id="btnDescargarReporte" href="#" class="btn btn-primary" target="_blank">
                    Descargar PDF
                </a>
            </div>

        </div>
    </div>
</div>

<div class="row">

    <!-- Calendario -->
    <div class="col-lg-8">

        <div class="card shadow-sm">
            <div class="card-body">
                <div id="calendar"></div>
            </div>
        </div>

    </div>

    <!-- Panel lateral -->
    <div class="col-lg-4">

        <div class="card shadow-sm">

            <div class="card-header bg-primary text-white">
                Detalles de Reserva
            </div>

            <div class="card-body" id="detalle-reserva">

                <div class="text-center text-muted">

                    <h5>Sin selección</h5>

                    <p>
                        Selecciona una reserva o un horario libre para ver detalles.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- FullCalendar CSS -->
<link
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.css"
    rel="stylesheet">

<!-- FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>

<script id="eventos-data" type="application/json">{{ eventos|tojson }}</script>

<script>

document.addEventListener('DOMContentLoaded', function() {

    const eventosDB = JSON.parse(document.getElementById('eventos-data').textContent);

    const calendarEl = document.getElementById('calendar');

    // Convertir eventos para FullCalendar
    const eventos = eventosDB.map(evento => ({

        id: evento.id,

        title: evento.title,

        start: evento.start,

        end: evento.end,

        color:
            evento.estado === "Activo"
                ? "#198754"
                : evento.estado === "Modificado"
                    ? "#ffc107"
                    : "#dc3545",

        extendedProps: {

            responsable: evento.responsable,

            asistentes: evento.asistentes,

            estado: evento.estado,

            sala: evento.sala || "Sin asignar"

        }

    }));

    const calendar = new FullCalendar.Calendar(calendarEl, {

        locale: 'es',

        initialView: 'timeGridWeek',

        allDaySlot: false,

        selectable: true,

        slotMinTime: '07:00:00',

        slotMaxTime: '21:00:00',

        height: 'auto',

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'timeGridWeek,timeGridDay'
        },

        events: eventos,

        // Mostrar asistentes y sala dentro del evento

        eventContent: function(arg) {

            return {

                html: `
                    <div>

                        <div style="font-weight:bold;">
                            ${arg.event.title}
                        </div>

                        <div style="font-size:11px;">
                            📍 ${arg.event.extendedProps.sala}
                        </div>

                        <div style="font-size:10px;">
                            👥 ${arg.event.extendedProps.asistentes}
                        </div>

                    </div>
                `
            };
        },

        // Selección de horario libre

        select: function(info) {

            document.getElementById('detalle-reserva').innerHTML = `

                <h5 class="mb-3">Nueva Reserva</h5>

                <p>
                    <strong>Inicio:</strong><br>
                    ${new Date(info.start).toLocaleString()}
                </p>

                <p>
                    <strong>Fin:</strong><br>
                    ${new Date(info.end).toLocaleString()}
                </p>

                <a
                    href="/registrar?inicio=${info.startStr}&fin=${info.endStr}"
                    class="btn btn-primary w-100">

                    Reservar Sala

                </a>

            `;
        },

        // Click en evento

        eventClick: function(info) {

            const e = info.event;

            const estado = e.extendedProps.estado;

            const badgeClass =
                estado === "Activo"
                    ? "bg-success"
                    : estado === "Modificado"
                        ? "bg-warning text-dark"
                        : "bg-danger";

            const cancelado = estado === "Cancelado";

            document.getElementById('detalle-reserva').innerHTML = `

                <h5 class="mb-3">
                    ${e.title}
                </h5>

                <div class="mb-2">

                    <span class="badge ${badgeClass}">
                        ${estado}
                    </span>

                </div>

                <p>
                    <strong>Responsable:</strong><br>
                    ${e.extendedProps.responsable}
                </p>

                <p>
                    <strong>Sala:</strong><br>
                    ${e.extendedProps.sala}
                </p>

                <p>
                    <strong>Asistentes:</strong><br>
                    ${e.extendedProps.asistentes}
                </p>

                <p>
                    <strong>Inicio:</strong><br>
                    ${e.start.toLocaleString()}
                </p>

                <p>
                    <strong>Fin:</strong><br>
                    ${e.end ? e.end.toLocaleString() : "Sin hora de fin"}
                </p>

                <div class="d-grid gap-2">

                    <a href="/editar/${e.id}" class="btn btn-outline-primary">
                        Editar
                    </a>

                    <form
                        method="POST"
                        action="/cancelar/${e.id}"
                        onsubmit="return confirm('¿Cancelar este evento?');">

                        <button
                            type="submit"
                            class="btn btn-outline-danger w-100"
                            ${cancelado ? "disabled" : ""}>
                            ${cancelado ? "Cancelado" : "Cancelar"}
                        </button>

                    </form>

                </div>

            `;
        }

    });

    calendar.render();

    // Convierte "2025-W25" al lunes de esa semana en formato YYYY-MM-DD
    function semanaAFecha(valorWeek) {
        const [anio, semana] = valorWeek.split('-W').map(Number);
        // 4 de enero siempre está en la semana 1 (ISO 8601)
        const cuatroEnero = new Date(anio, 0, 4);
        const lunes = new Date(cuatroEnero);
        lunes.setDate(cuatroEnero.getDate() - ((cuatroEnero.getDay() + 6) % 7) + (semana - 1) * 7);
        return lunes.toISOString().split('T')[0];
    }

    // Convierte una fecha JS al valor "YYYY-Www" para el input type=week
    function fechaAValorWeek(fecha) {
       
        const d = new Date(Date.UTC(fecha.getFullYear(), fecha.getMonth(), fecha.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const anio = d.getUTCFullYear();
        const semana = Math.ceil((((d - new Date(Date.UTC(anio, 0, 1))) / 86400000) + 1) / 7);
        return `${anio}-W${String(semana).padStart(2, '0')}`;
    }

    // Sincroniza el input de semana con la semana visible en el calendario
    document.getElementById('modalReporte').addEventListener('show.bs.modal', function () {
        const fechaActual = calendar.getDate();
        document.getElementById('fechaReporte').value = fechaAValorWeek(fechaActual);
        const lunes = semanaAFecha(fechaAValorWeek(fechaActual));
        document.getElementById('btnDescargarReporte').href = `/reporte/semanal?fecha=${lunes}`;
    });

    // Actualiza el href cuando cambia la semana seleccionada
    document.getElementById('fechaReporte').addEventListener('change', function () {
        if (!this.value) return;
        const lunes = semanaAFecha(this.value);
        document.getElementById('btnDescargarReporte').href = `/reporte/semanal?fecha=${lunes}`;
    });

});
</script>

<!-- Bootstrap JS  -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


{% endblock %}
