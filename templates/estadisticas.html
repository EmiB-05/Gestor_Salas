{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Estadísticas</h2>

<div class="row mb-4">

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Total Eventos</h6>
                <h2>{{ total_eventos }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Salas Utilizadas</h6>
                <h2>{{ total_salas }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Promedio Asistentes</h6>
                <h2>{{ promedio_asistentes }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Cancelados</h6>
                <h2>{{ cancelados }}</h2>
            </div>
        </div>
    </div>

</div>

<div class="row">

    <div class="col-lg-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Eventos por Sala
            </div>

            <div class="card-body">
                <canvas id="salasChart"></canvas>
            </div>
        </div>

    </div>

    <div class="col-lg-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Estado de Eventos
            </div>

            <div class="card-body">
                <canvas id="estadoChart"></canvas>
            </div>
        </div>

    </div>

</div>

<div class="row mt-4">

    <div class="col-12">

        <div class="card shadow-sm">

            <div class="card-header">
                Asistentes por Mes
            </div>

            <div class="card-body">

                <canvas id="asistentesChart"></canvas>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// Eventos por sala

new Chart(
    document.getElementById('salasChart'),
    {
        type: 'bar',
        data: {
            labels: {{ salas_labels|tojson }},
            datasets: [{
                label: 'Eventos',
                data: {{ salas_data|tojson }}
            }]
        }
    }
);

// Estado eventos

new Chart(
    document.getElementById('estadoChart'),
    {
        type: 'pie',
        data: {
            labels: {{ estado_labels|tojson }},
            datasets: [{
                data: {{ estado_data|tojson }}
            }]
        }
    }
);

// Asistentes por mes

new Chart(
    document.getElementById('asistentesChart'),
    {
        type: 'line',
        data: {
            labels: {{ meses_labels|tojson }},
            datasets: [{
                label: 'Asistentes',
                data: {{ asistentes_data|tojson }}
            }]
        }
    }
);

</script>

{% endblock %}
