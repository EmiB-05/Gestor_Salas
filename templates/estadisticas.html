{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Estadísticas</h2>

<form method="GET" class="row mb-4">

    <div class="col-md-3">

        <select name="mes" class="form-select">

            <option value="">Todos los meses</option>

            <option value="1" {% if mes_actual == 1 %}selected{% endif %}>Enero</option>
            <option value="2" {% if mes_actual == 2 %}selected{% endif %}>Febrero</option>
            <option value="3" {% if mes_actual == 3 %}selected{% endif %}>Marzo</option>
            <option value="4" {% if mes_actual == 4 %}selected{% endif %}>Abril</option>
            <option value="5" {% if mes_actual == 5 %}selected{% endif %}>Mayo</option>
            <option value="6" {% if mes_actual == 6 %}selected{% endif %}>Junio</option>
            <option value="7" {% if mes_actual == 7 %}selected{% endif %}>Julio</option>
            <option value="8" {% if mes_actual == 8 %}selected{% endif %}>Agosto</option>
            <option value="9" {% if mes_actual == 9 %}selected{% endif %}>Septiembre</option>
            <option value="10" {% if mes_actual == 10 %}selected{% endif %}>Octubre</option>
            <option value="11" {% if mes_actual == 11 %}selected{% endif %}>Noviembre</option>
            <option value="12" {% if mes_actual == 12 %}selected{% endif %}>Diciembre</option>

        </select>

    </div>

    <div class="col-md-2">

        <select name="anio" class="form-select">

            {% for a in range(2026,2031) %}
            <option value="{{ a }}"
                {% if anio_actual == a %}selected{% endif %}>
                {{ a }}
            </option>
            {% endfor %}

        </select>

    </div>

    <div class="col-md-2">

        <button class="btn btn-primary">
            Filtrar
        </button>

    </div>

</form>

<div class="row mb-4">

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Total Eventos</h6>
                <h2>{{ total_eventos }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
            <h6>Asistentes Totales</h6>
            <h2>{{ asistentes_totales }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Promedio Asistentes</h6>
                <h2>{{ promedio_asistentes }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card shadow-sm">
            <div class="card-body text-center">
                <h6>Cancelados</h6>
                <h2>{{ cancelados }}</h2>
            </div>
        </div>
    </div>

</div>

<div class="row">

    <div class="col-lg-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Eventos por Sala
            </div>

            <div class="card-body">
                <canvas id="salasChart"></canvas>
            </div>
        </div>

    </div>

    <div class="col-lg-6">

        <div class="card shadow-sm">
            <div class="card-header">
                Estado de Eventos
            </div>

            <div class="card-body">
                <canvas id="estadoChart"></canvas>
            </div>
        </div>

    </div>

</div>

<div class="row mt-4">

    <div class="col-12">

        <div class="card shadow-sm">

            <div class="card-header">
                {{ titulo_asistentes }}
            </div>

            <div class="card-body">

                <canvas id="asistentesChart"></canvas>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

// Eventos por sala

new Chart(
    document.getElementById('salasChart'),
    {
        type: 'bar',
        data: {
            labels: {{ salas_labels|tojson }},
            datasets: [{
                label: 'Eventos',
                data: {{ salas_data|tojson }}
            }]
        }
    }
);

// Estado eventos

new Chart(
    document.getElementById('estadoChart'),
    {
        type: 'pie',
        data: {
            labels: {{ estado_labels|tojson }},
            datasets: [{
                data: {{ estado_data|tojson }}
            }]
        }
    }
);

// Asistentes por mes

new Chart(
    document.getElementById('asistentesChart'),
    {
        type: 'line',
        data: {
            labels: {{ asistentes_labels|tojson }},
            datasets: [{
                label: 'Asistentes',
                data: {{ asistentes_data|tojson }}
            }]
        }
    }
);

</script>

{% endblock %}
